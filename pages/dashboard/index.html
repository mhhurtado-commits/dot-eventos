<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard · DOT Eventos</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/dashboard.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#7F77DD" />
</head>
<body class="db-body-page">

  <nav class="db-nav">
    <div class="db-nav-logo" onclick="window.location.href='/pages/dashboard'" style="cursor:pointer;">
      <div class="db-nav-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="5" fill="white"/>
          <circle cx="6"  cy="6"  r="2" fill="white" opacity="0.5"/>
          <circle cx="18" cy="6"  r="2" fill="white" opacity="0.5"/>
          <circle cx="6"  cy="18" r="2" fill="white" opacity="0.3"/>
          <circle cx="18" cy="18" r="2" fill="white" opacity="0.3"/>
        </svg>
      </div>
      <span class="db-nav-name">DOT</span>
    </div>
    <div class="db-nav-right">
      <button class="btn-agenda" onclick="window.location.href='/pages/agenda'">📅 Agenda</button>
      <div class="db-avatar" id="user-avatar">MH</div>
      <button class="btn-logout" id="btn-logout">Salir</button>
    </div>
  </nav>

  <div class="db-content">

    <div class="db-header">
      <div>
        <div class="db-title">Mis eventos</div>
        <div class="db-subtitle" id="user-greeting">Bienvenido</div>
      </div>
      <button class="btn-new" id="btn-nuevo">+ Nuevo evento</button>
    </div>
    <div class="db-section-title" id="lista-titulo">Próximos eventos</div>
    <div class="db-metrics">
      <div class="metric">
        <div class="metric-label">Eventos activos</div>
        <div class="metric-value" id="metric-activos">—</div>
        <div class="metric-sub">próximos</div>
      </div>
      <div class="metric">
        <div class="metric-label">Próximo evento</div>
        <div class="metric-value metric-value-sm" id="metric-proximo">—</div>
        <div class="metric-sub" id="metric-proximo-nombre">—</div>
      </div>
      <div class="metric" style="cursor:pointer;" onclick="window.location.href='/pages/agenda'">
        <div class="metric-label">Reuniones hoy</div>
        <div class="metric-value" id="metric-reuniones">—</div>
        <div class="metric-sub" id="metric-reuniones-sub">Ver agenda →</div>
      </div>
    </div>

    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" class="search-bar" placeholder="Buscar eventos..." />
    </div>

    <div class="filtros">
      <button class="filtro-btn active" data-filtro="todos">Todos</button>
      <button class="filtro-btn" data-filtro="confirmado">Confirmados</button>
      <button class="filtro-btn" data-filtro="progreso">En progreso</button>
      <button class="filtro-btn" data-filtro="borrador">Borradores</button>
    </div>
    <div class="filtros" style="margin-top:-0.5rem;">
    <button class="filtro-btn active" data-vista="proximos">Próximos</button>
    <button class="filtro-btn" data-vista="pasados">Historial</button>
    <button class="filtro-btn" data-vista="todos">Todos</button>
    </div>

    <div class="db-section-title">Próximos eventos</div>
    <div class="event-list" id="event-list">
      <div class="event-empty">Cargando eventos...</div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/dashboard.js"></script>
</body>
</html>
