<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evento · DOT Eventos</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/dashboard.css" />
  <link rel="stylesheet" href="../../css/evento.css" />
  <link rel="stylesheet" href="../../css/reuniones.css" />
</head>
<body class="db-body-page">

  <nav class="db-nav">
    <div class="db-nav-logo" onclick="window.location.href='/pages/dashboard'" style="cursor:pointer;">
      <div class="db-nav-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="5" fill="white"/>
          <circle cx="6"  cy="6"  r="2" fill="white" opacity="0.5"/>
          <circle cx="18" cy="6"  r="2" fill="white" opacity="0.5"/>
          <circle cx="6"  cy="18" r="2" fill="white" opacity="0.3"/>
          <circle cx="18" cy="18" r="2" fill="white" opacity="0.3"/>
        </svg>
      </div>
      <span class="db-nav-name">DOT</span>
    </div>
    <div class="db-nav-right">
      <button class="btn-logout" onclick="window.location.href='/pages/dashboard'">← Volver</button>
      <button class="btn-new" id="btn-editar">Editar</button>
    </div>
  </nav>

  <div class="db-content">

    <div class="evento-header">
      <div class="evento-header-left">
        <div class="evento-dot" id="evento-dot"></div>
        <div>
          <h1 class="evento-titulo" id="evento-titulo">Cargando...</h1>
          <div class="evento-meta" id="evento-meta"></div>
        </div>
      </div>
      <span class="event-badge" id="evento-badge"></span>
    </div>

    <div class="progreso-wrapper" id="progreso-wrapper">
      <div class="progreso-info">
        <span class="progreso-label">Cuenta regresiva</span>
        <span class="progreso-dias" id="progreso-dias">—</span>
      </div>
      <div class="progreso-bar">
        <div class="progreso-fill" id="progreso-fill"></div>
      </div>
    </div>

    <div class="db-metrics">
      <div class="metric">
        <div class="metric-label">Presupuesto</div>
        <div class="metric-value metric-value-sm" id="ev-presupuesto">—</div>
        <div class="metric-sub">Total estimado</div>
      </div>
      <div class="metric">
        <div class="metric-label">Gastado</div>
        <div class="metric-value metric-value-sm" id="ev-gastado">$0</div>
        <div class="metric-sub">Pagos realizados</div>
      </div>
      <div class="metric">
        <div class="metric-label">Saldo</div>
        <div class="metric-value metric-value-sm" id="ev-saldo">—</div>
        <div class="metric-sub">Disponible</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="info">Info</button>
      <button class="tab" data-tab="reuniones">Reuniones</button>
      <button class="tab" data-tab="reservas">Reservas</button>
      <button class="tab" data-tab="presupuesto">Presupuesto</button>
      <button class="tab" data-tab="notas">Notas</button>
    </div>

    <div class="tab-content active" id="tab-info">
      <div class="info-card">
        <div class="info-row"><span class="info-label">Tipo</span><span class="info-value" id="info-tipo">—</span></div>
        <div class="info-row"><span class="info-label">Nombre</span><span class="info-value" id="info-nombre">—</span></div>
        <div class="info-row"><span class="info-label">Fecha</span><span class="info-value" id="info-fecha">—</span></div>
        <div class="info-row"><span class="info-label">Lugar</span><span class="info-value" id="info-lugar">—</span></div>
        <div class="info-row"><span class="info-label">Estado</span><span class="info-value" id="info-estado">—</span></div>
      </div>
      <div class="info-card" style="margin-top:1rem;">
        <div class="info-row"><span class="info-label">Contacto</span><span class="info-value" id="info-contacto">—</span></div>
        <div class="info-row"><span class="info-label">Teléfono</span><span class="info-value" id="info-telefono">—</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-value" id="info-email">—</span></div>
        <div class="info-row"><span class="info-label">Dirección</span><span class="info-value" id="info-direccion">—</span></div>
      </div>
      <button class="btn-exportar" id="btn-exportar">⬇ Exportar a PDF</button>
      <button class="btn-exportar" id="btn-presupuesto" style="background:#f4f3ff;color:#7F77DD;margin-top:0.5rem;">📄 Generar presupuesto formal</button>
    </div>

    <div class="tab-content" id="tab-reuniones">
      <div class="section-header">
        <span class="db-section-title">Próximas reuniones</span>
        <button class="btn-new btn-sm" id="btn-ir-reuniones">Ver todas →</button>
      </div>
      <div class="reunion-preview" id="reunion-preview">
        <div class="event-empty">Cargando...</div>
      </div>
    </div>

    <div class="tab-content" id="tab-reservas">
      <div class="section-header">
        <span class="db-section-title">Reservas</span>
        <button class="btn-new btn-sm" id="btn-agregar-reserva">+ Agregar</button>
      </div>
      <div class="form-nota" id="form-reserva" style="display:none;">
        <input type="text" id="res-nombre" class="form-input" placeholder="Servicio (ej: Fotografía)" />
        <input type="text" id="res-contacto" class="form-input" placeholder="Nombre del contacto" />
        <input type="text" id="res-telefono" class="form-input" placeholder="Teléfono" />
        <input type="text" id="res-email" class="form-input" placeholder="Email (opcional)" />
        <select id="res-estado" class="form-input">
          <option value="borrador">Sin confirmar</option>
          <option value="progreso">En negociación</option>
          <option value="confirmado">Confirmado</option>
        </select>
        <textarea id="res-notas" class="form-input form-textarea" placeholder="Notas adicionales..." style="min-height:70px;"></textarea>
        <div class="form-nota-actions">
          <button class="btn-cancel" id="btn-cancelar-reserva">Cancelar</button>
          <button class="btn-new" id="btn-guardar-reserva">Guardar reserva</button>
        </div>
      </div>
      <div class="reserva-list" id="reserva-list"><div class="event-empty">Cargando...</div></div>
    </div>

    <div class="tab-content" id="tab-presupuesto">
      <div class="section-header">
        <span class="db-section-title">Movimientos</span>
        <button class="btn-new btn-sm" id="btn-agregar-movimiento">+ Agregar</button>
      </div>
      <div class="form-nota" id="form-movimiento" style="display:none;">
        <input type="text" id="mov-concepto" class="form-input" placeholder="Concepto (ej: Seña fotografía)" />
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Tipo</label>
            <select id="mov-tipo" class="form-input">
              <option value="egreso">Egreso (gasto)</option>
              <option value="ingreso">Ingreso (cobro)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Monto</label>
            <div class="input-prefix">
              <span class="prefix">$</span>
              <input type="number" id="mov-monto" class="form-input with-prefix" placeholder="0" />
            </div>
          </div>
        </div>
        <input type="date" id="mov-fecha" class="form-input" />
        <div class="form-nota-actions">
          <button class="btn-cancel" id="btn-cancelar-movimiento">Cancelar</button>
          <button class="btn-new" id="btn-guardar-movimiento">Guardar movimiento</button>
        </div>
      </div>
      <div class="movimiento-list" id="movimiento-list"><div class="event-empty">Cargando...</div></div>
    </div>

    <div class="tab-content" id="tab-notas">
      <div class="section-header">
        <span class="db-section-title">Notas</span>
        <button class="btn-new btn-sm" id="btn-agregar-nota">+ Agregar</button>
      </div>
      <div class="form-nota" id="form-nota" style="display:none;">
        <input type="text" id="nota-titulo-input" class="form-input" placeholder="Título de la nota" />
        <textarea id="nota-texto-input" class="form-input form-textarea" placeholder="Escribí tu nota acá..."></textarea>
        <div class="form-group">
          <label class="form-label">Imagen (opcional)</label>
          <input type="file" id="nota-imagen-input" class="form-input" accept="image/*" />
        </div>
        <div class="form-group">
          <label class="form-label">Audio (mp3, m4a, ogg)</label>
          <input type="file" id="nota-audio-input" class="form-input" accept="audio/*" />
        </div>
        <div class="form-nota-actions">
          <button class="btn-cancel" id="btn-cancelar-nota">Cancelar</button>
          <button class="btn-new" id="btn-guardar-nota">Guardar nota</button>
        </div>
      </div>
      <div class="nota-list" id="nota-list"><div class="event-empty">Cargando...</div></div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/evento.js"></script>
</body>
</html>
