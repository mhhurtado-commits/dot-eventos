<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOT Eventos</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="5" fill="white"/>
            <circle cx="6"  cy="6"  r="2" fill="white" opacity="0.5"/>
            <circle cx="18" cy="6"  r="2" fill="white" opacity="0.5"/>
            <circle cx="6"  cy="18" r="2" fill="white" opacity="0.3"/>
            <circle cx="18" cy="18" r="2" fill="white" opacity="0.3"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">DOT</span>
          <span class="logo-sub">Eventos</span>
        </div>
      </div>

      <p class="tagline">Organizá cada evento, en un solo lugar</p>

      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <div class="divider">
        <span></span>
        <p>o ingresá con email</p>
        <span></span>
      </div>

      <div class="form">
        <input type="email" id="email" placeholder="tu@email.com" />
        <input type="password" id="password" placeholder="Contraseña" />
        <button class="btn-primary" id="btn-login">Ingresar</button>
      </div>

      <p class="footer-note">Al ingresar con Google, tu cuenta se crea automáticamente.</p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
